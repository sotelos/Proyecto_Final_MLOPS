name: MLOps_Pipeline_Seguros_EAN

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-train:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: make install

      - name: Verificar calidad de código (Lint)
        run: make lint

      - name: Ejecutar Pruebas
        run: make test

      - name: Ejecutar Entrenamiento
        run: make train

      - name: Guardar Modelo como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: modelo-seguros-ean
          path: mlruns/
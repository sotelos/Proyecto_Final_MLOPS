name: MLOps_Pipeline_Seguros_EAN

# 1. Definimos CUÁNDO se activa (al hacer push a la rama main)
# Le estamos diciendo a GitHub: "Cada vez que yo suba código, alquila un servidor Linux, 
# instala mi requirements.txt y corre mi entrenamiento de seguros". Es la base de la Integración Continua (CI).

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 2. Definimos QUÉ va a hacer
jobs:
  build-and-train:
    runs-on: ubuntu-latest # Usamos un servidor Linux temporal de GitHub

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias necesarias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar entrenamiento y registrar en MLflow
        run: |
          python src/train.py